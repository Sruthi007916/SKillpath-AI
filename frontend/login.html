<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SkillPath AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root{
    --bg:#0B0A1A; --bg2:#13112A; --bg3:#1C1A3A;
    --primary:#7C3AED; --primary-light:#9F67FF; --secondary:#3B82F6;
    --accent:#F97316; --text:#FFFFFF; --muted:#94A3B8; --border:rgba(255,255,255,0.09);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;overflow-x:hidden;}
h1,h2{font-family:'Sora',sans-serif;}

.blob{position:fixed;border-radius:50%;filter:blur(130px);opacity:0.22;z-index:-1;pointer-events:none;}
.blob-1{width:460px;height:460px;background:#7C3AED;top:-160px;left:-160px;}
.blob-2{width:420px;height:420px;background:#3B82F6;bottom:-150px;right:-150px;animation:drift 10s ease-in-out infinite alternate;}
@keyframes drift{from{transform:translate(0,0);}to{transform:translate(-20px,-20px);}}

.auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;gap:60px;}
@media(max-width:900px){.auth-container{flex-direction:column;gap:32px;padding:32px 20px;}}

.auth-left{max-width:420px;}
@media(max-width:900px){.auth-left{text-align:center;}}
.brand{display:inline-flex;align-items:center;gap:10px;font-family:'Sora',sans-serif;font-weight:800;font-size:1.15rem;color:#fff;text-decoration:none;margin-bottom:28px;}
.brand i{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:1rem;}
.auth-left h1{font-size:2.4rem;font-weight:800;letter-spacing:-0.02em;line-height:1.15;margin-bottom:16px;}
.auth-left p{color:var(--muted);font-size:1rem;line-height:1.7;}
@media(max-width:900px){.auth-left h1{font-size:1.9rem;}}

.auth-card{width:400px;max-width:100%;background:rgba(255,255,255,0.045);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:22px;padding:38px 34px;box-shadow:0 24px 60px -20px rgba(0,0,0,0.5);animation:cardIn 0.5s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.auth-card h2{font-size:1.5rem;font-weight:700;margin-bottom:26px;letter-spacing:-0.01em;}

.input-group-custom{position:relative;margin-bottom:18px;}
.input-group-custom i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.9rem;transition:color 0.2s;}
.input-group-custom input{width:100%;padding:14px 16px 14px 46px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-family:'Poppins',sans-serif;font-size:0.92rem;transition:border-color 0.2s,background 0.2s;}
.input-group-custom input::placeholder{color:#5B6478;}
.input-group-custom input:focus{outline:none;border-color:var(--primary);background:rgba(124,58,237,0.08);}
.input-group-custom input:focus + i,
.input-group-custom:focus-within i{color:var(--primary-light);}

.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;color:#fff;font-family:'Poppins',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:6px;transition:transform 0.2s,box-shadow 0.2s;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px -10px rgba(124,58,237,0.6);}
.auth-btn:disabled{opacity:0.65;cursor:not-allowed;transform:none;box-shadow:none;}

.bottom-text{text-align:center;color:var(--muted);font-size:0.86rem;margin-top:22px;}
.bottom-text a{color:var(--primary-light);font-weight:600;text-decoration:none;}
.bottom-text a:hover{text-decoration:underline;}

#errorBox{display:none;color:#FCA5A5;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);border-radius:10px;padding:11px 15px;margin-bottom:18px;font-size:0.84rem;line-height:1.5;}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="auth-container">

    <div class="auth-left">
        <a href="index.html" class="brand"><i class="fa-solid fa-brain"></i> SkillPath AI</a>
        <h1>Welcome back!</h1>
        <p>Continue your personalized learning journey and pick up right where you left off on the path to your career.</p>
    </div>

    <div class="auth-right">
        <div class="auth-card">
            <h2>Log in</h2>

            <div id="errorBox"></div>

            <form id="loginForm">
                <div class="input-group-custom">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email address" required autocomplete="email">
                </div>
                <div class="input-group-custom">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-btn" id="loginBtn">Log in</button>
            </form>

            <p class="bottom-text">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>

</div>

<script>
const API_BASE = "http://127.0.0.1:5000";
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const btn      = document.getElementById("loginBtn");
    const errorBox = document.getElementById("errorBox");

    errorBox.style.display = "none";
    errorBox.textContent   = "";
    btn.disabled    = true;
    btn.textContent = "Logging in...";

    try {
        const response = await fetch(API_BASE + "/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();

        if (response.ok) {
            localStorage.setItem("currentUser", JSON.stringify({
                id: data.user_id, name: data.name, email, has_profile: data.has_profile
            }));
            window.location.href = data.has_profile ? "dashboard.html" : "profile.html";
        } else {
            errorBox.textContent   = data.message || "Invalid email or password.";
            errorBox.style.display = "block";
            btn.disabled    = false;
            btn.textContent = "Log in";
        }
    } catch (err) {
        errorBox.textContent   = "Cannot connect to server. Make sure Flask is running.";
        errorBox.style.display = "block";
        btn.disabled    = false;
        btn.textContent = "Log in";
        console.error(err);
    }
});
</script>

</body>
</html>
